<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Package Statistics Dashboard</title>
    <meta name="description" content="Real-time download and usage statistics for npm packages and Chrome Web Store extensions">
    <meta name="keywords" content="npm, packages, statistics, downloads, chrome extensions, dashboard">
    <meta name="author" content="Mikl Wolfe">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://chiefmikey.github.io/stats/">
    <meta property="og:title" content="📊 Package Statistics Dashboard">
    <meta property="og:description" content="Real-time download and usage statistics for npm packages and Chrome Web Store extensions">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://chiefmikey.github.io/stats/">
    <meta property="twitter:title" content="📊 Package Statistics Dashboard">
    <meta property="twitter:description" content="Real-time download and usage statistics for npm packages and Chrome Web Store extensions">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        .last-updated {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 25px;
            display: inline-block;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        
        .section {
            padding: 40px;
        }
        
        .section-title {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
        }
        
        .stats-grid {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }
        
        .package-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #e9ecef;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .package-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .package-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        
        .package-description {
            color: #6c757d;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        
        .package-links {
            margin-bottom: 20px;
        }
        
        .package-links a {
            color: #3498db;
            text-decoration: none;
            margin-right: 15px;
            font-weight: 500;
        }
        
        .package-links a:hover {
            text-decoration: underline;
        }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        
        .stat-badge {
            text-align: center;
            padding: 10px;
            background: white;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }
        
        .stat-badge img {
            max-width: 100%;
            height: auto;
        }
        
        .chrome-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .chrome-card {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
        }
        
        .chrome-card h3 {
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
        
        .chrome-stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }
        
        .error {
            text-align: center;
            padding: 40px;
            color: #dc3545;
            background: #f8d7da;
            border-radius: 10px;
            margin: 20px;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .section {
                padding: 20px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Package Statistics</h1>
            <p>Real-time download and usage statistics for my packages</p>
            <div class="last-updated" id="lastUpdated">
                Loading...
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">📦 NPM Packages</h2>
            <div class="stats-grid" id="npmPackages">
                <div class="loading">Loading package statistics...</div>
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">🌐 Chrome Web Store</h2>
            <div class="chrome-stats" id="chromeExtensions">
                <div class="loading">Loading extension statistics...</div>
            </div>
        </div>
    </div>

    <script>
        // Load stats data
        async function loadStats() {
            try {
                const response = await fetch('/api.json');
                const data = await response.json();
                
                // Update last updated time
                const lastUpdated = document.getElementById('lastUpdated');
                lastUpdated.textContent = `Last updated: ${new Date(data.lastUpdated).toLocaleString()}`;
                
                // Render NPM packages
                renderNpmPackages(data.packages.npm);
                
                // Render Chrome extensions
                renderChromeExtensions(data.packages.chrome);
                
            } catch (error) {
                console.error('Error loading stats:', error);
                document.getElementById('npmPackages').innerHTML = '<div class="error">Failed to load package statistics</div>';
                document.getElementById('chromeExtensions').innerHTML = '<div class="error">Failed to load extension statistics</div>';
            }
        }
        
        function renderNpmPackages(packages) {
            const container = document.getElementById('npmPackages');
            container.innerHTML = packages.map(pkg => `
                <div class="package-card">
                    <div class="package-name">${pkg.name}</div>
                    <div class="package-description">${pkg.description}</div>
                    <div class="package-links">
                        <a href="${pkg.github}" target="_blank">GitHub</a>
                        <a href="${pkg.npm}" target="_blank">NPM</a>
                    </div>
                    <div class="stats-row">
                        <div class="stat-badge">
                            <img src="https://img.shields.io/npm/dw/${pkg.package}?color=rgba%280%2C0%2C0%2C0%29&style=for-the-badge&label=" alt="Weekly downloads">
                        </div>
                        <div class="stat-badge">
                            <img src="https://img.shields.io/npm/dm/${pkg.package}?color=rgba%280%2C0%2C0%2C0%29&style=for-the-badge&label=" alt="Monthly downloads">
                        </div>
                        <div class="stat-badge">
                            <img src="https://img.shields.io/npm/dy/${pkg.package}?color=rgba%280%2C0%2C0%2C0%29&style=for-the-badge&label=" alt="Yearly downloads">
                        </div>
                        <div class="stat-badge">
                            <img src="https://img.shields.io/npm/dt/${pkg.package}?color=rgba%280%2C0%2C0%2C0%29&style=for-the-badge&label=" alt="Total downloads">
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderChromeExtensions(extensions) {
            const container = document.getElementById('chromeExtensions');
            container.innerHTML = extensions.map(ext => `
                <div class="chrome-card">
                    <h3>${ext.name}</h3>
                    <p style="margin-bottom: 20px; opacity: 0.9;">${ext.description}</p>
                    <div class="chrome-stats-grid">
                        <div class="stat-badge" style="background: rgba(255,255,255,0.2);">
                            <img src="https://img.shields.io/chrome-web-store/rating-count/${ext.extensionId}?color=rgba%280%2C0%2C0%2C0%29&style=for-the-badge" alt="Rating count">
                        </div>
                        <div class="stat-badge" style="background: rgba(255,255,255,0.2);">
                            <img src="https://img.shields.io/chrome-web-store/rating/${ext.extensionId}?color=rgba%280%2C0%2C0%2C0%29&style=for-the-badge" alt="Rating">
                        </div>
                        <div class="stat-badge" style="background: rgba(255,255,255,0.2);">
                            <img src="https://img.shields.io/chrome-web-store/stars/${ext.extensionId}?color=rgba%280%2C0%2C0%2C0%29&style=for-the-badge" alt="Stars">
                        </div>
                        <div class="stat-badge" style="background: rgba(255,255,255,0.2);">
                            <img src="https://img.shields.io/chrome-web-store/users/${ext.extensionId}?color=rgba%280%2C0%2C0%2C0%29&style=for-the-badge" alt="Users">
                        </div>
                    </div>
                    <div style="margin-top: 15px;">
                        <a href="${ext.store}" target="_blank" style="color: white; text-decoration: none; font-weight: 500;">View in Store</a>
                    </div>
                </div>
            `).join('');
        }
        
        // Load stats when page loads
        document.addEventListener('DOMContentLoaded', loadStats);
        
        // Auto-refresh every 5 minutes
        setInterval(loadStats, 5 * 60 * 1000);
    </script>
</body>
</html>
